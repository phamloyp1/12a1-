<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu du lịch Bắc Ninh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
            color: darkblue;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .left, .right {
            width: 50%;
        }
        img {
            width: 100%;
            border-radius: 8px;
        }
        video {
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: 0;
        }
    </style>
</head>
<body>

    <h1>Giới thiệu du lịch Bắc Ninh</h1>

    <p>
        Bắc Ninh là vùng đất giàu truyền thống văn hóa, nổi tiếng với
        dân ca Quan họ và nhiều di tích lịch sử lâu đời.
    </p>

    <div class="container">
        <!-- Bên trái: Hình ảnh -->
        <div class="left">
            <h3>Hình ảnh Bắc Ninh</h3>
            <img src="bacninh.jpg" alt="Phong cảnh Bắc Ninh">
        </div>

        <!-- Bên phải: Video -->
        <div class="right">
            <h3>Video giới thiệu</h3>
            <video controls>
                <source src="thuc-tinh.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ video.
            </video>
        </div>
    </div>

    <h3>Bản đồ Bắc Ninh</h3>
    <!-- Iframe Google Maps -->
    <iframe 
        src="https://www.google.com/maps?q=Bắc%20Ninh&output=embed">
    </iframe>

</body>
</html>
